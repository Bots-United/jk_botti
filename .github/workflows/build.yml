name: Build

on:
  workflow_call:
    inputs:
      ver_major:
        required: false
        type: string
        default: ''
      ver_minor:
        required: false
        type: string
        default: ''
      ver_note:
        required: false
        type: string
        default: ''

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CXX: i686-linux-gnu-g++
      CC: i686-linux-gnu-gcc
      AR: "i686-linux-gnu-ar rc"
      RANLIB: i686-linux-gnu-ranlib
    steps:
      - uses: actions/checkout@v6
      - name: Install packages
        run: sudo apt-get -y update && sudo apt-get -y install build-essential g++-i686-linux-gnu
      - name: Build variants (shim + x87 + SSE3 + AVX2FMA)
        run: |
          VERFLAGS=""
          if [ -n "${{ inputs.ver_major }}" ]; then
            VERFLAGS="VER_MAJOR=${{ inputs.ver_major }} VER_MINOR=${{ inputs.ver_minor }} VER_NOTE=${{ inputs.ver_note }}"
          fi
          make -j4 variants $VERFLAGS
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: |
            jk_botti_mm_i386.so
            jk_botti_mm_x87_i386.so
            jk_botti_mm_sse3_i386.so
            jk_botti_mm_avx2fma_i386.so

  build-linux-bionic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Build variants in Ubuntu 18.04 i386 container
        run: |
          VERFLAGS=""
          if [ -n "${{ inputs.ver_major }}" ]; then
            VERFLAGS="VER_MAJOR=${{ inputs.ver_major }} VER_MINOR=${{ inputs.ver_minor }} VER_NOTE=${{ inputs.ver_note }}"
          fi
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
            lpenz/ubuntu-bionic-i386 \
            bash -c "apt-get -y update && apt-get -y install build-essential g++ make && make -j4 variants $VERFLAGS"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-bionic-binaries
          path: |
            jk_botti_mm_i386.so
            jk_botti_mm_x87_i386.so
            jk_botti_mm_sse3_i386.so
            jk_botti_mm_avx2fma_i386.so

  build-windows:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install packages
        run: sudo apt-get -y update && sudo apt-get -y install gcc-mingw-w64 g++-mingw-w64
      - name: Build variants (shim + x87 + SSE3 + AVX2FMA)
        run: |
          VERFLAGS=""
          if [ -n "${{ inputs.ver_major }}" ]; then
            VERFLAGS="VER_MAJOR=${{ inputs.ver_major }} VER_MINOR=${{ inputs.ver_minor }} VER_NOTE=${{ inputs.ver_note }}"
          fi
          make -j4 OSTYPE=win32 variants $VERFLAGS
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-binaries
          path: |
            jk_botti_mm.dll
            jk_botti_mm_x87.dll
            jk_botti_mm_sse3.dll
            jk_botti_mm_avx2fma.dll
